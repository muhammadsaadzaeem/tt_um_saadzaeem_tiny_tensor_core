# Tiny Tapeout project information
project:
  title:        "Tiny Tensor Core"
  author:       "Saad Zaeem"
  discord:      ""
  description:  "2x2 INT8 systolic-array matrix multiplication accelerator with byte-serial control interface"
  language:     "Verilog"
  clock_hz:     25000000

  tiles: "1x1"

  top_module:  "tt_um_saadzaeem_tiny_tensor_core"

  source_files:
    - "tt_um_saadzaeem_tiny_tensor_core.v"
    - "systolic_2x2_real.v"
    - "pe.v"

pinout:
  # Inputs
  ui[0]: "data_in[0]"
  ui[1]: "data_in[1]"
  ui[2]: "data_in[2]"
  ui[3]: "data_in[3]"
  ui[4]: "data_in[4]"
  ui[5]: "data_in[5]"
  ui[6]: "data_in[6]"
  ui[7]: "data_in[7]"

  # Outputs
  uo[0]: "data_out[0]"
  uo[1]: "data_out[1]"
  uo[2]: "data_out[2]"
  uo[3]: "data_out[3]"
  uo[4]: "data_out[4]"
  uo[5]: "data_out[5]"
  uo[6]: "data_out[6]"
  uo[7]: "data_out[7]"

  # Bidirectional pins
  uio[0]: "state[0]"
  uio[1]: "state[1]"
  uio[2]: "state[2]"
  uio[3]: "state[3]"
  uio[4]: "unused"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

yaml_version: 6